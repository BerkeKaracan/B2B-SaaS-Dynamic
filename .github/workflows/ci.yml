name: Project CI Pipeline

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']

jobs:
  frontend-ci:
    name: Frontend Build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: 'https://dummy12345.supabase.co'
      NEXT_PUBLIC_SUPABASE_ANON_KEY: 'dummy-anon-key-for-ci-build'
      RESEND_API_KEY: 're_dummy1234567890'
      SENTRY_AUTH_TOKEN: 'dummy-sentry-token-for-ci'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build application
        run: npm run build

  backend-ci:
    name: Backend Test Suite
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: 'sqlite:///./test.db'
      SUPABASE_URL: 'https://dummy12345.supabase.co'
      SUPABASE_KEY: 'dummy-service-key-for-ci'
      SUPABASE_SERVICE_ROLE_KEY: 'dummy-service-role-key-for-ci'
      REDIS_URL: 'redis://localhost:6379'
      PYTHONPATH: '.'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run backend tests
        run: |
          cd backend
          python -m pytest

  e2e-tests:
    name: End-to-End Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
