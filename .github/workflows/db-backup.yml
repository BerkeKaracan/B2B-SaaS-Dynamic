name: Supabase Database Backup

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Backup Database via Docker
        env:
          PGHOST: aws-1-eu-central-1.pooler.supabase.com
          PGUSER: postgres.vdfqqlyrrzcscaaizrac
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          docker run --rm \
            -e PGPASSWORD="$PGPASSWORD" \
            postgres:17 \
            pg_dump -h $PGHOST -p 5432 -U $PGUSER -d postgres -x -O > backup.sql

      - name: Upload Backup as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-db-backup
          path: backup.sql
          retention-days: 30
