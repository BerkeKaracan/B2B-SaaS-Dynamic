services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: b2b-backend
    ports:
      - '8000:8000'
    env_file:
      - ./backend/.env
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - b2b-network

  frontend:
    build:
      context: .
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - INTERNAL_API_URL=http://backend:8000
      dockerfile: Dockerfile
    container_name: b2b-frontend
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - INTERNAL_API_URL=http://backend:8000
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - b2b-network

networks:
  b2b-network:
    driver: bridge
