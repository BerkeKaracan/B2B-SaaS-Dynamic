apiVersion: apps/v1
kind: Deployment
metadata:
  name: b2b-backend-deployment
  namespace: production
  labels:
    app: b2b-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: b2b-backend
  template:
    metadata:
      labels:
        app: b2b-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: b2b-backend
          image: <YOUR_AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/b2b-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          envFrom:
            - secretRef:
                name: b2b-backend-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: b2b-backend-svc
  namespace: production
spec:
  type: ClusterIP
  selector:
    app: b2b-backend
  ports:
    - protocol: TCP
    port: 80
    targetPort: 8000