apiVersion: apps/v1
kind: Deployment
metadata:
  name: b2b-frontend-deployment
  namespace: production
  labels:
    app: b2b-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: b2b-frontend
  template:
    metadata:
      labels:
        app: b2b-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: b2b-frontend
          image: <YOUR_AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/b2b-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          envFrom:
            - configMapRef:
                name: b2b-frontend-config
---
apiVersion: v1
kind: Service
metadata:
  name: b2b-frontend-svc
  namespace: production
spec:
  type: ClusterIP
  selector:
    app: b2b-frontend
  ports:
    - protocol: TCP
    port: 80
    targetPort: 3000